<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E8B4B8" />
    <meta
      name="description"
      content="Nyanja Gift Hub RW, curated gifts and fashion from Rwanda. Shop online with care."
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Nyanja" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <title>Nyanja Gift Hub RW · Curated gifts from Rwanda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <!-- Capture beforeinstallprompt before deferred Vite bundles load (classic race otherwise). -->
    <script>
      ;(function () {
        var w = typeof window !== 'undefined' ? window : null
        if (!w) return
        w.__NYANJA_BIP__ = null
        w.addEventListener('beforeinstallprompt', function (ev) {
          ev.preventDefault()
          w.__NYANJA_BIP__ = ev
          w.dispatchEvent(new Event('nyanja:bip'))
        })
        w.addEventListener('appinstalled', function () {
          w.__NYANJA_BIP__ = null
          w.dispatchEvent(new Event('nyanja:installed'))
        })
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
